name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Trigger response: HTTP ${HTTP}"
          if [ "${HTTP}" != "201" ] && [ "${HTTP}" != "200" ]; then
            echo "Unexpected status ${HTTP} - aborting"
            exit 1
          fi
          echo "Deploy triggered successfully."

      - name: Poll until live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Waiting 20s for deploy to register..."
          sleep 20
          for i in $(seq 1 24); do
            RESPONSE=$(curl -fsS \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=1")
            STATUS=$(echo "${RESPONSE}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['deploy']['status'] if d else 'unknown')" 2>/dev/null || echo "unknown")
            echo "  [${i}/24] Status: ${STATUS}"
            if [ "${STATUS}" = "live" ]; then
              echo "Deploy is live."
              exit 0
            fi
            if [ "${STATUS}" = "build_failed" ] || [ "${STATUS}" = "update_failed" ]; then
              echo "Deploy failed: ${STATUS}"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out."
          exit 1

      - name: Site health check
        run: |
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" https://oklahomabloodinstitute.com/)
          echo "Health check: HTTP ${HTTP}"
          if [ "${HTTP}" != "200" ]; then
            echo "Site returned ${HTTP} - health check failed"
            exit 1
          fi
          echo "Site is healthy."
