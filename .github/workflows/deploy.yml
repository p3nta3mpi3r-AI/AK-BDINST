name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Trigger response: HTTP $HTTP"
          if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
            echo "Unexpected status $HTTP — aborting"
            exit 1
          fi
          echo "Deploy triggered successfully."

      - name: Poll until live
        run: |
          echo "Waiting 20s for deploy to register..."
          sleep 20
          for i in $(seq 1 24); do
            STATUS=$(curl -fsS \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=1" \
              | python3 -c "
import sys, json
deploys = json.load(sys.stdin)
if deploys:
    d = deploys[0].get('deploy', deploys[0])
    print(d.get('status', 'unknown'))
else:
    print('unknown')
")
            echo "  [$i/24] Status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy is live."
              exit 0
            fi
            if [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for deploy."
          exit 1

      - name: Site health check
        run: |
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" https://oklahomabloodinstitute.com/)
          echo "Health check: HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "Site returned $HTTP — health check failed"
            exit 1
          fi
          echo "Site is healthy."
